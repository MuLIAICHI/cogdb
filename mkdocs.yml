site_name: CogDB
site_description: A cognitive database engine for AI agents — episodic, semantic, and procedural memory in one engine.
site_url: https://www.cogdb.xyz/docs/
repo_url: https://github.com/MuLIAICHI/cogdb
repo_name: MuLIAICHI/cogdb
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Getting Started: tutorial_getting_started.md
  - API Reference: api.md
  - Guides:
      - Migrating from Mem0: tutorial_migrating_from_mem0.md
  - Research: research.md

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/MuLIAICHI/cogdb
  generator: false

copyright: "© 2026 Mustapha Liaichi · MIT License"
