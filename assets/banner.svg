<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <linearGradient id="brainGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <radialGradient id="nodeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <!-- Brain logo positioned on left -->
  <g transform="translate(20, 0) scale(0.83)">
    <path d="M 120 30
             C 75 30, 45 60, 45 95
             C 35 100, 30 115, 35 130
             C 30 145, 35 160, 50 168
             C 50 185, 65 200, 85 200
             C 90 210, 105 215, 120 212
             C 135 215, 150 210, 155 200
             C 175 200, 190 185, 190 168
             C 205 160, 210 145, 205 130
             C 210 115, 205 100, 195 95
             C 195 60, 165 30, 120 30 Z"
          stroke="url(#brainGrad2)" stroke-width="2.5" fill="none" stroke-linejoin="round"/>
    <path d="M 120 35 C 118 80, 122 130, 120 210"
          stroke="#10b981" stroke-width="1.5" stroke-dasharray="3 3" fill="none" opacity="0.5"/>
    <path d="M 70 80 Q 90 75, 105 85" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 60 110 Q 80 105, 100 115" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 65 145 Q 85 140, 105 150" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 75 175 Q 95 170, 110 180" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 170 80 Q 150 75, 135 85" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 180 110 Q 160 105, 140 115" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 175 145 Q 155 140, 135 150" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 165 175 Q 145 170, 130 180" stroke="#10b981" stroke-width="1.5" fill="none" opacity="0.6"/>

    <circle cx="120" cy="75" r="14" fill="url(#nodeGlow2)"/>
    <circle cx="120" cy="75" r="6" fill="#10b981" filter="url(#glow2)"/>
    <circle cx="85" cy="155" r="14" fill="url(#nodeGlow2)"/>
    <circle cx="85" cy="155" r="6" fill="#10b981" filter="url(#glow2)"/>
    <circle cx="155" cy="155" r="14" fill="url(#nodeGlow2)"/>
    <circle cx="155" cy="155" r="6" fill="#10b981" filter="url(#glow2)"/>

    <line x1="120" y1="75" x2="85" y2="155" stroke="#10b981" stroke-width="1.5" opacity="0.4" stroke-dasharray="2 3"/>
    <line x1="120" y1="75" x2="155" y2="155" stroke="#10b981" stroke-width="1.5" opacity="0.4" stroke-dasharray="2 3"/>
    <line x1="85" y1="155" x2="155" y2="155" stroke="#10b981" stroke-width="1.5" opacity="0.4" stroke-dasharray="2 3"/>

    <circle cx="65" cy="95" r="2.5" fill="#34d399"/>
    <circle cx="175" cy="95" r="2.5" fill="#34d399"/>
    <circle cx="55" cy="130" r="2.5" fill="#34d399"/>
    <circle cx="185" cy="130" r="2.5" fill="#34d399"/>
    <circle cx="100" cy="185" r="2.5" fill="#34d399"/>
    <circle cx="140" cy="185" r="2.5" fill="#34d399"/>
    <circle cx="120" cy="120" r="2.5" fill="#34d399"/>
  </g>

  <!-- Wordmark "CogDB" -->
  <text x="240" y="115"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="78"
        font-weight="700"
        fill="url(#textGrad)"
        letter-spacing="-2">CogDB</text>

  <!-- Tagline -->
  <text x="244" y="148"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace"
        font-size="16"
        font-weight="400"
        fill="#10b981"
        opacity="0.7"
        letter-spacing="2">A COGNITIVE DATABASE FOR AI AGENTS</text>

  <!-- Decorative blinking cursor -->
  <rect x="455" y="62" width="8" height="60" fill="#10b981" opacity="0.6"/>
</svg>
